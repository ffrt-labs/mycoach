services:
  mycoach:
    build: .
    container_name: mycoach
    restart: unless-stopped
    env_file: .env
    environment:
      MYCOACH_DB_URL: sqlite+aiosqlite:////data/mycoach.db
      MYCOACH_GARMIN_TOKEN_DIR: /data/garmin_tokens
    volumes:
      - app-data:/data
    # Bound to localhost only, purely for debugging (`curl localhost:8000`
    # when SSH'd into the box). The real path in is the shared homelab-edge
    # Caddy, reverse-proxying over the `edge` network below by service name
    # — this port is never how the LAN or the PWA reach the app.
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - edge
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/system/status', timeout=4).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

networks:
  # Shared with every other app on the home server plus the homelab-edge
  # Caddy container, which is the only thing with a published host port
  # (443) and the sole way in from the LAN. Created by homelab-edge's own
  # deploy (see that repo) — must already exist before this compose file
  # runs, or `docker compose up` fails with "network edge declared as
  # external, but could not be found".
  edge:
    external: true

volumes:
  app-data:
