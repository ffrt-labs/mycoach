services:
  app:
    build: .
    container_name: mycoach
    restart: unless-stopped
    env_file: .env
    environment:
      MYCOACH_DB_URL: sqlite+aiosqlite:////data/mycoach.db
      MYCOACH_GARMIN_TOKEN_DIR: /data/garmin_tokens
    volumes:
      - app-data:/data
    # Bound to localhost only — Caddy (below) is the sole way in from the
    # LAN, over HTTPS. Keeps a cleartext HTTP path from ever existing
    # alongside the HTTPS one (which would be a second origin and could leak
    # MYCOACH_API_TOKEN). `curl localhost:8000` still works from the host
    # itself for debugging.
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/system/status', timeout=4).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: mycoach-caddy
    restart: unless-stopped
    env_file: .env
    depends_on:
      - app
    # Published on the host so the app is reachable across the LAN at
    # https://<MYCOACH_DOMAIN>. Only ever needs to resolve/route on the LAN —
    # see Caddyfile and README for the DNS-01 + grey-cloud DNS setup.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Must persist: holds the issued cert. Let's Encrypt allows only 5
      # duplicate certs per domain per week — losing this volume repeatedly
      # can exhaust that limit.
      - caddy-data:/data
      - caddy-config:/config

volumes:
  app-data:
  caddy-data:
  caddy-config:
