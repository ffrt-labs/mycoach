{% extends "base.html" %}
{% block title %}Set Availability — MyCoach{% endblock %}

{% block content %}
<div class="space-y-6 pb-20 sm:pb-6">
    <!-- Header -->
    <div>
        <h1 class="text-2xl font-bold text-gray-900">Set Availability</h1>
        <p class="text-sm text-gray-500">{{ week_start_str }} — {{ week_end_str }}</p>
    </div>

    <p class="text-sm text-gray-600">
        Select the days you can train next week and the sport for each session.
    </p>

    <!-- Availability form -->
    <form id="availability-form" method="post" class="space-y-3" hx-boost="false">
        {% for day in week_days %}
        <div class="rounded-xl shadow-sm border border-gray-200 bg-white overflow-hidden">
            <div class="px-4 py-3">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" name="day_{{ day.day_of_week }}_enabled"
                        class="day-toggle h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500"
                        data-day="{{ day.day_of_week }}"
                        {% if day.slot %}checked{% endif %}>
                    <div class="flex items-center gap-3 flex-1">
                        <div class="w-10 text-center">
                            <p class="text-xs uppercase font-semibold text-gray-500">{{ day.day_name[:3] }}</p>
                            <p class="text-lg font-bold text-gray-700">{{ day.date.day }}</p>
                        </div>
                        <span class="font-medium text-gray-900">{{ day.day_name }}</span>
                    </div>
                </label>

                <!-- Slot inputs (shown when day is enabled) -->
                <div id="slot-{{ day.day_of_week }}" class="mt-3 pl-11 {% if not day.slot %}hidden{% endif %}">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Sport</label>
                        <select name="day_{{ day.day_of_week }}_sport"
                            class="w-full rounded-lg border-gray-300 text-sm px-2 py-1.5 focus:ring-blue-500 focus:border-blue-500">
                            {% for sport in ['gym', 'swimming', 'running', 'padel'] %}
                            <option value="{{ sport }}"
                                {% if day.slot and day.slot.sport == sport %}selected{% endif %}
                                {% if not day.slot and sport == 'gym' %}selected{% endif %}>
                                {{ sport.capitalize() }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}

        <!-- Submit -->
        <div class="pt-2">
            <button type="submit" id="save-btn"
                class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-4 rounded-xl transition-colors">
                Save Availability
            </button>
            <div id="save-result" class="mt-3 text-center text-sm"></div>
        </div>
    </form>
</div>

<script>
(function() {
    // Toggle slot inputs visibility when checkbox changes
    document.querySelectorAll('.day-toggle').forEach(function(cb) {
        cb.addEventListener('change', function() {
            var day = this.dataset.day;
            var slotDiv = document.getElementById('slot-' + day);
            if (this.checked) {
                slotDiv.classList.remove('hidden');
            } else {
                slotDiv.classList.add('hidden');
            }
        });
    });

    // Intercept form submit to build JSON and POST to API
    var form = document.getElementById('availability-form');
    form.addEventListener('submit', function(e) {
        e.preventDefault();

        var slots = [];
        for (var day = 0; day < 7; day++) {
            var cb = form.querySelector('[name="day_' + day + '_enabled"]');
            if (cb && cb.checked) {
                var sportVal = form.querySelector('[name="day_' + day + '_sport"]').value;
                slots.push({
                    day_of_week: day,
                    sport: sportVal
                });
            }
        }

        var weekStart = '{{ week_start.isoformat() }}';
        var payload = { week_start: weekStart, slots: slots };

        var resultDiv = document.getElementById('save-result');
        var btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.textContent = 'Saving...';

        fetch('/api/availability', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function(resp) {
            var ct = resp.headers.get('content-type') || '';
            if (resp.ok) {
                if (ct.indexOf('application/json') !== -1) {
                    return resp.json().then(function(data) {
                        resultDiv.innerHTML = '<span class="text-green-600 font-medium">Saved ' + data.length + ' slot(s) for next week.</span>';
                    });
                } else {
                    resultDiv.innerHTML = '<span class="text-green-600 font-medium">Availability saved.</span>';
                }
            } else {
                if (ct.indexOf('application/json') !== -1) {
                    return resp.json().then(function(data) {
                        resultDiv.innerHTML = '<span class="text-red-600 font-medium">Error: ' + (data.detail || 'Unknown error') + '</span>';
                    });
                } else {
                    return resp.text().then(function(text) {
                        console.error('Save failed:', resp.status, text);
                        resultDiv.innerHTML = '<span class="text-red-600 font-medium">Error ' + resp.status + ': Server error. Check console for details.</span>';
                    });
                }
            }
        }).catch(function(err) {
            console.error('Availability save error:', err);
            resultDiv.innerHTML = '<span class="text-red-600 font-medium">Network error: ' + err.message + '</span>';
        }).finally(function() {
            btn.disabled = false;
            btn.textContent = 'Save Availability';
        });
    });
})();
</script>
{% endblock %}
