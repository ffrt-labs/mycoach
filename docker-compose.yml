services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      MYCOACH_DB_URL: sqlite+aiosqlite:////data/mycoach.db
      MYCOACH_GARMIN_TOKEN_DIR: /data/garmin_tokens
    volumes:
      - app-data:/data
    ports:
      - "8000:8000"

  # Optional: Caddy reverse proxy for automatic HTTPS
  # Uncomment and set your domain to enable.
  #
